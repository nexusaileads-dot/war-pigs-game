<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <title>WAR PIGS</title>
    <meta
      name="description"
      content="WAR PIGS - Tactical Swine Warfare on Telegram Mini Apps."
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #0a0a0a;
      }

      body {
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      img {
        user-select: none;
        -webkit-user-drag: none;
      }

      button,
      canvas {
        touch-action: manipulation;
      }

      .loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ff6b35;
        font-size: 24px;
        text-align: center;
        background: #0a0a0a;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">Loading WAR PIGS...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
